<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page non trouvée | BIDARN IPTV</title>
  <meta name="description" content="La page que vous recherchez n'existe pas. Retournez à l'accueil de BIDARN pour trouver le meilleur abonnement IPTV Belgique en 4K.">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <meta name="google-site-verification" content="r6Xw-hS8dTKcGDbVYyktz5cZ9gFNz4JR6YcYJoaiHxc" />
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .error-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      padding: 2rem;
    }
    .error-card {
      max-width: 500px;
      width: 100%;
      padding: 3.5rem 2.5rem;
      border-radius: var(--border-radius-lg);
      position: relative;
      z-index: 1;
    }
    .error-code {
      font-size: 7rem;
      font-family: var(--font-headings);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 1rem;
      letter-spacing: -0.05em;
      background: var(--gradient-gold);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: pulse 2s infinite;
    }
    .error-title {
      font-size: 1.75rem;
      margin-bottom: 1rem;
    }
    .error-desc {
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    @keyframes pulse {
      0% { filter: drop-shadow(0 0 2px rgba(212, 175, 55, 0.4)); }
      50% { filter: drop-shadow(0 0 15px rgba(243, 156, 18, 0.6)); }
      100% { filter: drop-shadow(0 0 2px rgba(212, 175, 55, 0.4)); }
    }
  </style>
</head>
<body>
  
  <div class="error-wrapper">
    <div class="hero-bg"></div>
    <div class="error-card glass" style="border: 1px solid rgba(212, 175, 55, 0.15);">
      <div class="error-code">404</div>
      <h1 class="error-title">Page non trouvée</h1>
      <p class="error-desc">La page que vous recherchez a peut-être été supprimée, a changé de nom ou est temporairement indisponible.</p>
      <a href="/" class="btn btn-primary"><i class="fa-solid fa-house" style="margin-right: 0.5rem;"></i> Retour à l'accueil</a>
    </div>
  </div>

</body>
</html>
